<div class="survey-wrapper">
  <!-- Loading -->
  <div *ngIf="isLoading" class="state-box">Loading survey...</div>

  <!-- Error -->
  <div *ngIf="errorMessage && !isLoading" class="state-box error">
    {{ errorMessage }}
    <button class="btn-secondary" (click)="goHome()">Back to Surveys</button>
  </div>

  <!-- Success State -->
  <div *ngIf="submitted" class="success-box">
    <div class="success-icon">🎉</div>
    <h2>Survey Complete!</h2>
    <p>Your response is being reviewed.</p>
    <div class="points-earned">
      <span>+{{ pointsEarned }} pts earned</span>
    </div>
    <div class="new-balance">New balance: ⭐ {{ newBalance }} pts</div>
    <button class="btn-primary" (click)="goHome()">Back to Surveys</button>
  </div>

  <!-- Survey Form -->
  <div *ngIf="survey && !isLoading && !submitted" class="survey-card">
    <!-- Survey Header -->
    <div class="survey-header">
      <h1>{{ survey.title }}</h1>
      <span class="points-badge"
        >🏆 {{ survey.points_reward }} pts on completion</span
      >
    </div>

    <form [formGroup]="surveyForm" (ngSubmit)="onSubmit()">
      <div formArrayName="answers">
        <!-- ↑ formArrayName links this div to the
              'answers' FormArray in your component -->

        <div
          *ngFor="let question of survey.questions; let i = index"
          class="question-block"
        >
          <p class="question-text">
            <span class="question-number">Q{{ i + 1 }}.</span>
            {{ question.question_text }}
          </p>

          <!-- TEXT Question -->
          <textarea
            *ngIf="question.type === 'TEXT'"
            [formControlName]="i.toString()"
            placeholder="Type your answer here..."
            class="text-input"
            rows="3"
          >
          </textarea>

          <!-- RADIO Question -->
          <div *ngIf="question.type === 'RADIO'" class="options-list">
            <label *ngFor="let option of question.options" class="option-label">
              <input
                type="radio"
                [formControlName]="i.toString()"
                [value]="option"
              />
              {{ option }}
            </label>
          </div>

          <!-- SELECT Question -->
          <select
            *ngIf="question.type === 'SELECT'"
            [formControlName]="i.toString()"
            class="select-input"
          >
            <option value="" disabled>Select an option</option>
            <option *ngFor="let option of question.options" [value]="option">
              {{ option }}
            </option>
          </select>

          <!-- CHECKBOX Question -->
          <div
            *ngIf="question.type === 'CHECKBOX'"
            class="options-list"
            [formArrayName]="i.toString()"
          >
            <!-- ↑ Nested formArrayName for checkbox groups -->
            <label
              *ngFor="let option of question.options; let j = index"
              class="option-label"
            >
              <input type="checkbox" [formControlName]="j" />
              {{ option }}
            </label>
          </div>
        </div>
      </div>

      <!-- API Error -->
      <div class="api-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="btn-primary"
        [disabled]="surveyForm.invalid || isSubmitting"
      >
        {{ isSubmitting ? "Submitting..." : "Submit Survey" }}
      </button>
    </form>
  </div>
</div>
